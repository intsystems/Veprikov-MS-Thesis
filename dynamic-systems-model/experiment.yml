# See paper for experiment description

default_models_variance: &default_params_variance 
  sgd_model: {'alpha' : 0., 'max_iter' : 50}

default_models_delta: &default_params_delta
  ridgecv_model: {}
  # ridge_model: {'alpha' : 0.}
  # sgd_model: {'alpha' : 0., 'max_iter' : 100}


single_model: &single_model !BasicStage
  name: single_model
  params:
    needs_dvc: false
    model_params:
      <<: *default_params_delta
    experiment:
      train_size: 0.3
      run_times: 10
      step_hist: 100
      random_seed:  42
      data_type: "synthetic"
      noise: 0.1
  outputs:
    - !path
      path: "./results/single_model"
  script:
    - >
        python ./src/main.py single-model \
               --model_params "${json(self.params.model_params)}" \
               --params "${json(self.params.experiment)}" \
               --folder "${self.outputs[0].path}"
    - >
      echo "${json(self.params)}" > "${self.outputs[0].path}/params.json"

hidden_loops: &hidden_loops !BasicStage
  name: hidden_loops
  params:
    kind: hidden_loop
    model_params:
      <<: *default_params_delta
    experiment: &hidden_experiment
      adherence: 0.2
      usage: 0.7
      retrain_step: 20
      noise: 0.1
      step_hist: 10
      N: 10001
      run_times: 10
      random_seed: 42
      data_type: "synthetic"
  outputs:
    - !path
      path: ${self.params.path}
  script:
    - mkdir -vp "${self.outputs[0].path}"
    - >
      python ./src/main.py ${self.params.kind} \
                     --model_params "${json(self.params.model_params)}" \
                     --params "${json(self.params.experiment)}" \
                     --folder "${self.outputs[0].path}" 
    - >
      echo "${json(self.params)}" > "${self.outputs[0].path}/params.json"

pipeline: !GenericPipeline
  runs:
    - *single_model
    - *hidden_loops

base_path_variance: &base_path_variance !line |
                                         ./results/${self.params.kind}_variance/
                                         ${self.params.experiment.noise}-
                                         ${self.params.experiment.adherence}-
                                         ${self.params.experiment.usage}

base_path_delta: &base_path_delta !line | 
                                  ./results

variance_experiment: &variance_experiment
  adherence: ${env.adherence}
  usage: ${env.usage}
  retrain_step: 10
  run_times: 1
  noise: ${env.noise}
  step_hist: 1400
  N: 1400
  random_seed: 42
  data_type: "synthetic"

delta_experiment: &delta_experiment
  adherence: 0
  usage: 1
  control_strategy: ${env.control_strategy}
  control_init: ${env.control_init}
  retrain_step: 10
  run_times: 1
  noise: 1
  N: 3000
  random_seed: 42
  data_type: ${env.data_type}

run_variance_experiment: !GenericPipeline
  runs:
    - !BasicStage
      <<: *hidden_loops
      params:
        kind: hidden-loop
        model_params:
          <<: *default_params_variance
        experiment:
          <<: *variance_experiment
        path: *base_path_variance
          
    - !BasicStage
      <<: *hidden_loops
      params:
        kind: hidden-sample
        model_params:
          <<: *default_params_variance
        experiment:
          <<: *variance_experiment
        path: *base_path_variance

run_delta_experiment: !GenericPipeline
  runs:          
    - !BasicStage
      <<: *hidden_loops
      params:
        kind: hidden-sample
        model_params:
          <<: *default_params_delta
        experiment:
          <<: *delta_experiment
        path: *base_path_delta

Make_figures: !GenericPipeline
  runs:
    - !BasicStage
      name: Make_figures
      inputs:
        - !path
          path: "./code/Analysis_of_Variance.ipynb"
        - !path
          path: "./code/Normality_and_Hist.ipynb"
        - !path
          path: "./code/Limit_to_Delta_Function.ipynb"
        - !path
          path: "./code/Autonomy_check.ipynb"
        - !path
          path: "./code/Decreasing_Moments.ipynb"
        - !path
          path: "./results"
      outputs:
        - !path
          path: "./figures"
      env: 
        MLDEV_VARIANCE_LOOP_PATH: "results/hidden-loop_variance"
        MLDEV_VARIANCE_SAMPLE_PATH: "results/hidden-sample_variance"
        MLDEV_DELTA_LOOP_PATH: "results/hidden-loop_delta"
        MLDEV_DELTA_SAMPLE_PATH: "results/hidden-sample_delta"
        MLDEV_SAVEFIGURES_PATH: "figures"
      script:
        - mkdir -p ./figures ; true ; pwd
        - "mldev run -f ./experiment_jupyter.yml ${env.pipeline}"
